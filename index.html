<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>永續漁獲地圖 | 首頁</title>
    <meta name="description" content="沉浸式 3D 永續漁獲地圖首頁。" />
    <link rel="stylesheet" href="home.css" />
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <div class="mobile-social-dock" aria-label="社群連結">
      <a class="social-dock-btn social-facebook" href="#" aria-label="Facebook" title="Facebook">
        <span aria-hidden="true">f</span>
      </a>
      <a class="social-dock-btn social-instagram" href="#" aria-label="Instagram" title="Instagram">
        <span aria-hidden="true">◎</span>
      </a>
      <a class="social-dock-btn social-instagram-alt" href="#" aria-label="Instagram profile" title="Instagram profile">
        <span aria-hidden="true">IG</span>
      </a>
      <button class="social-dock-btn social-language language-toggle" type="button" aria-label="切換中文英文" title="中文 / English">
        <span aria-hidden="true" data-lang-icon>EN</span>
      </button>
    </div>



    <div class="desktop-social-dock" aria-label="社群連結">
      <a class="social-dock-btn social-facebook" href="#" aria-label="Facebook" title="Facebook"><span aria-hidden="true">f</span></a>
      <a class="social-dock-btn social-instagram" href="#" aria-label="Instagram" title="Instagram"><span aria-hidden="true">◎</span></a>
      <a class="social-dock-btn social-instagram-alt" href="#" aria-label="Instagram profile" title="Instagram profile"><span aria-hidden="true">IG</span></a>
      <button class="social-dock-btn social-language language-toggle" type="button" aria-label="切換中文英文" title="中文 / English"><span aria-hidden="true" data-lang-icon>EN</span></button>
    </div>

    <div class="social-more-backdrop" hidden></div>
    <section id="socialMorePanel" class="social-more-panel" role="dialog" aria-modal="true" aria-label="更多社群連結" hidden>
      <button class="social-panel-close" type="button" aria-label="關閉更多社群連結">×</button>
      <div class="social-panel-title">更多聯絡方式</div>
      <div class="social-panel-grid">
        <a class="social-panel-item social-line" href="#" aria-label="LINE"><span aria-hidden="true">LINE</span></a>
        <a class="social-panel-item social-linkedin" href="#" aria-label="LinkedIn"><span aria-hidden="true">in</span></a>
        <a class="social-panel-item social-instagram" href="#" aria-label="Instagram"><span aria-hidden="true">◎</span></a>
        <a class="social-panel-item social-mail" href="mailto:" aria-label="Mail"><span aria-hidden="true">✉</span></a>
      </div>
    </section>
    <script type="module" src="home.js"></script>
    <script src="site-i18n.js"></script>
  </body>
</html>
